function filterMembers() {
  const q = document.getElementById('member-search').value.toLowerCase();
  document.querySelectorAll('#member-table tr[data-name]').forEach(tr => {
    tr.style.display = (!q || tr.dataset.name.toLowerCase().includes(q) || tr.dataset.id.toLowerCase().includes(q)) ? '' : 'none';
  });
}

function openAddMember() {
  showModal(`<div class="modal">
    <div class="modal-header"><h3>添加成员</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">学号 *（唯一，作为登录账号）</label><input class="form-control" id="add-id" placeholder="如：20230005"></div>
      <div class="form-group"><label class="form-label">姓名 *</label><input class="form-control" id="add-name" placeholder="真实姓名"></div>
      <div class="form-group"><label class="form-label">初始密码（可选，默认学号后6位）</label><input class="form-control" id="add-pwd" placeholder="留空则默认学号后6位"></div>
      <div class="form-group"><label class="form-label">备注（职务等）</label><input class="form-control" id="add-remark" placeholder="如：学委、组长"></div>
      <div class="alert alert-info"><span class="alert-icon">ℹ️</span>新账号创建后，成员可直接用账号+密码登录，无需选择身份类型。</div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="addMember()">添加成员</button>
    </div>
  </div>`);
}

function addMember() {
  const id = document.getElementById('add-id').value.trim();
  const name = document.getElementById('add-name').value.trim();
  const pwd = document.getElementById('add-pwd').value.trim() || id.slice(-6);
  const remark = document.getElementById('add-remark').value.trim();
  if (!id || !name) { toast('请填写学号和姓名', 'error'); return; }
  if (pwd.length < 4) { toast('密码至少4位', 'error'); return; }
  const users = DB.get('users') || [];
  if (users.find(u => u.id === id)) { toast('该学号已存在', 'error'); return; }
  users.push({ id, name, role: 'member', pwd, status: 'active', remark, createdAt: Date.now() });
  DB.set('users', users); addLog('添加成员', `${name}(${id})`);
  closeModal(); renderMembers(); toast(`成员 ${name} 添加成功`, 'success');
}

function editMember(id) {
  const users = DB.get('users') || [];
  const m = users.find(u => u.id === id); if (!m) return;
  showModal(`<div class="modal">
    <div class="modal-header"><h3>编辑成员</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">学号</label><input class="form-control" value="${m.id}" disabled style="background:#f3f4f6"></div>
      <div class="form-group"><label class="form-label">姓名 *</label><input class="form-control" id="edit-name" value="${m.name}"></div>
      <div class="form-group"><label class="form-label">备注</label><input class="form-control" id="edit-remark" value="${m.remark || ''}"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveMemberEdit('${id}')">保存</button>
    </div>
  </div>`);
}

function saveMemberEdit(id) {
  const name = document.getElementById('edit-name').value.trim();
  const remark = document.getElementById('edit-remark').value.trim();
  if (!name) { toast('姓名不能为空', 'error'); return; }
  const users = DB.get('users') || [];
  const m = users.find(u => u.id === id); if (!m) return;
  m.name = name; m.remark = remark;
  DB.set('users', users); addLog('编辑成员', `${name}(${id})`);
  closeModal(); renderMembers(); toast('成员信息已更新', 'success');
}

function resetMemberPwd(id, name) {
  confirm2('重置密码', `确认将 ${name} 的密码重置为学号后6位？`, () => {
    const users = DB.get('users') || [];
    const m = users.find(u => u.id === id); if (!m) return;
    m.pwd = id.slice(-6);
    DB.set('users', users); addLog('重置密码', `${name}(${id})`);
    toast(`${name} 的密码已重置为：${id.slice(-6)}`, 'success');
  });
}

function toggleMember(id) {
  const users = DB.get('users') || [];
  const m = users.find(u => u.id === id); if (!m) return;
  m.status = m.status === 'active' ? 'disabled' : 'active';
  DB.set('users', users); addLog(m.status === 'disabled' ? '禁用成员' : '启用成员', `${m.name}(${id})`);
  renderMembers(); toast(`已${m.status === 'disabled' ? '禁用' : '启用'} ${m.name}`, 'success');
}

function importMembers() {
  showModal(`<div class="modal">
    <div class="modal-header"><h3>📥 批量导入成员</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="alert alert-info"><span class="alert-icon">ℹ️</span>每行一人，格式：<b>学号,姓名,备注</b>（备注可留空）<br>示例：<code>20230005,陈七</code> 或 <code>20230006,周八,班委</code></div>
      <textarea class="form-control" id="import-data" rows="10" placeholder="20230005,陈七&#10;20230006,周八,班委&#10;20230007,钱九"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="doImport()">导入</button>
    </div>
  </div>`);
}

function doImport() {
  const raw = document.getElementById('import-data').value.trim();
  if (!raw) { toast('请输入数据', 'error'); return; }
  const users = DB.get('users') || [];
  let added = 0, skipped = 0;
  raw.split('\n').forEach(line => {
    const parts = line.trim().split(','); if (parts.length < 2) return;
    const [id, name, remark = ''] = parts.map(s => s.trim());
    if (!id || !name) return;
    if (users.find(u => u.id === id)) { skipped++; return; }
    users.push({ id, name, role: 'member', pwd: id.slice(-6), status: 'active', remark, createdAt: Date.now() });
    added++;
  });
  DB.set('users', users); addLog('批量导入', `新增${added}人，跳过${skipped}人`);
  closeModal(); renderMembers(); toast(`导入完成：新增 ${added} 人，跳过 ${skipped} 人（已存在）`, 'success');
}

function exportMembers() {
  const members = getAllMembers();
  const csv = '学号,姓名,状态,备注\n' + members.map(m => `${m.id},${m.name},${m.status==='active'?'正常':'禁用'},${m.remark||''}`).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = '班级成员名单.csv'; a.click();
  URL.revokeObjectURL(url); toast('名单已导出为CSV文件', 'success');
}

// ============================================================
// STATS
// ============================================================
function renderStats() {
  if (!isAdmin()) return;
  const scs = DB.get('screenshots') || [];
  const rps = DB.get('replies') || [];
  const hws = DB.get('homeworks') || [];
  const leaves = DB.get('leaves') || [];
  const members = getMembers();

  function rate(tasks, key) {
    if (!tasks.length || !members.length) return 0;
    const total = tasks.reduce((s, t) => s + (t[key] || []).length, 0);
    return Math.round(total / tasks.length / members.length * 100);
  }

  document.getElementById('content').innerHTML = `
  <div class="stats-row">
    <div class="stat-card"><div class="stat-top"><div><div class="stat-num">${members.length}</div><div class="stat-label">班级成员</div></div><div class="stat-icon" style="background:#eef0fd">👥</div></div></div>
    <div class="stat-card"><div class="stat-top"><div><div class="stat-num">${scs.length+rps.length+hws.length}</div><div class="stat-label">总任务数</div></div><div class="stat-icon" style="background:#fffbeb">📋</div></div></div>
    <div class="stat-card"><div class="stat-top"><div><div class="stat-num" style="color:var(--success)">${rate(scs,'submissions')}%</div><div class="stat-label">截图平均完成率</div></div><div class="stat-icon" style="background:var(--success-light)">🖼️</div></div></div>
    <div class="stat-card"><div class="stat-top"><div><div class="stat-num" style="color:var(--primary)">${leaves.filter(l=>l.status==='approved').length}</div><div class="stat-label">请假审批通过</div></div><div class="stat-icon" style="background:var(--primary-light)">📝</div></div></div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-title"><span class="icon">📊</span>成员完成情况</div>
      <div class="table-wrap"><table>
        <tr><th>成员</th><th>截图</th><th>回复</th><th>作业</th><th>请假</th></tr>
        ${members.map(m => {
          const scD = scs.filter(t => t.submissions?.find(s => s.uid === m.id)).length;
          const rpD = rps.filter(t => t.replies?.find(r => r.uid === m.id)).length;
          const hwD = hws.filter(t => t.submissions?.find(s => s.uid === m.id)).length;
          const lvD = leaves.filter(l => l.uid === m.id).length;
          return `<tr><td><div style="display:flex;align-items:center;gap:6px"><div class="avatar" style="width:24px;height:24px;font-size:10px">${m.name.slice(-1)}</div>${m.name}</div></td><td>${scD}/${scs.length}</td><td>${rpD}/${rps.length}</td><td>${hwD}/${hws.length}</td><td>${lvD}</td></tr>`;
        }).join('')}
      </table></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">📋</span>请假统计</div>
      <div class="three-col" style="margin-bottom:16px">
        <div style="text-align:center;padding:12px;background:var(--gray-light);border-radius:8px"><div style="font-size:22px;font-weight:700">${leaves.length}</div><div style="font-size:11px;color:var(--text-sub)">总申请</div></div>
        <div style="text-align:center;padding:12px;background:var(--success-light);border-radius:8px"><div style="font-size:22px;font-weight:700;color:#166534">${leaves.filter(l=>l.status==='approved').length}</div><div style="font-size:11px;color:#166534">已批准</div></div>
        <div style="text-align:center;padding:12px;background:var(--warning-light);border-radius:8px"><div style="font-size:22px;font-weight:700;color:#92400e">${leaves.filter(l=>l.status==='pending').length}</div><div style="font-size:11px;color:#92400e">待审批</div></div>
      </div>
      <div class="card-title" style="font-size:13px;margin-bottom:10px">任务完成率概览</div>
      ${scs.length > 0 ? `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>🖼️ 截图收集</span><span>${rate(scs,'submissions')}%</span></div><div class="progress"><div class="progress-bar progress-bar-primary" style="width:${rate(scs,'submissions')}%"></div></div></div>` : ''}
      ${rps.length > 0 ? `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>✅ 收到回复</span><span>${rate(rps,'replies')}%</span></div><div class="progress"><div class="progress-bar progress-bar-success" style="width:${rate(rps,'replies')}%"></div></div></div>` : ''}
      ${hws.length > 0 ? `<div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>📖 作业提交</span><span>${rate(hws,'submissions')}%</span></div><div class="progress"><div class="progress-bar progress-bar-warning" style="width:${rate(hws,'submissions')}%"></div></div></div>` : ''}
    </div>
  </div>`;
}

// ============================================================
// HISTORY
// ============================================================
function renderHistory() {
  const logs = DB.get('logs') || [];
  const myLogs = isAdmin() ? logs : logs.filter(l => l.user === currentUser.id);
  document.getElementById('content').innerHTML = `
  <div class="card">
    <div class="card-header"><div class="card-title"><span class="icon">🕐</span>历史记录</div><span style="font-size:12px;color:var(--text-sub)">最近 ${Math.min(myLogs.length, 200)} 条</span></div>
    ${myLogs.length === 0 ? '<div class="empty-state"><p>暂无记录</p></div>' : `
    <div class="table-wrap"><table>
      <tr><th>时间</th>${isAdmin() ? '<th>操作人</th>' : ''}<th>操作</th><th>详情</th></tr>
      ${myLogs.slice(0, 200).map(l => `<tr>
        <td style="white-space:nowrap;font-size:12px;color:var(--text-sub)">${fmtDate(l.time)}</td>
        ${isAdmin() ? `<td><span style="font-weight:500">${l.userName}</span></td>` : ''}
        <td><span class="badge badge-primary">${l.action}</span></td>
        <td style="font-size:13px">${l.detail}</td>
      </tr>`).join('')}
    </table></div>`}
  </div>`;
}

// ============================================================
// PROFILE
// ============================================================
function renderProfile() {
  const settings = DB.get('settings') || {};
  document.getElementById('content').innerHTML = `
  <div class="two-col" style="align-items:start">
    <div class="card">
      <div class="card-title">👤 个人中心</div>
      <div style="display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--gray-border);margin-bottom:20px">
        <div class="avatar" style="width:60px;height:60px;font-size:24px">${currentUser.name.slice(-1)}</div>
        <div>
          <div style="font-size:20px;font-weight:700">${currentUser.name}</div>
          <div style="color:var(--text-sub);font-size:13px;margin-top:2px">账号：${currentUser.id}</div>
          <div style="margin-top:6px"><span class="badge ${isAdmin() ? 'badge-purple' : 'badge-primary'}">${isAdmin() ? '👑 管理者（班长）' : '👤 普通成员'}</span></div>
        </div>
      </div>
      <div class="card-title" style="font-size:14px;margin-bottom:14px">🔒 修改密码</div>
      <div class="form-group"><label class="form-label">当前密码</label><input class="form-control" type="password" id="pwd-old" placeholder="请输入当前密码"></div>
      <div class="form-group"><label class="form-label">新密码</label><input class="form-control" type="password" id="pwd-new" placeholder="至少6位"></div>
      <div class="form-group"><label class="form-label">确认新密码</label><input class="form-control" type="password" id="pwd-confirm" placeholder="再次输入新密码"></div>
      <button class="btn btn-primary" onclick="changePwd()">修改密码</button>
    </div>
    ${isAdmin() ? `<div class="card">
      <div class="card-title">⚙️ 系统设置</div>
      <div class="form-group"><label class="form-label">班级名称</label><input class="form-control" id="setting-classname" value="${settings.className || ''}"></div>
      <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
      <div style="border-top:1px solid var(--gray-border);margin-top:20px;padding-top:20px">
        <div class="card-title" style="font-size:14px;color:var(--danger);margin-bottom:10px">⚠️ 危险操作</div>
        <button class="btn btn-danger btn-sm" onclick="clearAllData()">清空所有数据（慎用）</button>
      </div>
    </div>` : '<div class="card"><div class="card-title">📊 我的统计</div>' + (() => {
      const uid = currentUser.id;
      const scs = DB.get('screenshots') || [], rps = DB.get('replies') || [], hws = DB.get('homeworks') || [], leaves = DB.get('leaves') || [];
      return `<div class="three-col">
        <div style="text-align:center"><div style="font-size:26px;font-weight:700;color:var(--success)">${scs.filter(t=>t.submissions?.find(s=>s.uid===uid)).length}/${scs.length}</div><div style="font-size:12px;color:var(--text-sub)">截图完成</div></div>
        <div style="text-align:center"><div style="font-size:26px;font-weight:700;color:var(--primary)">${rps.filter(t=>t.replies?.find(r=>r.uid===uid)).length}/${rps.length}</div><div style="font-size:12px;color:var(--text-sub)">回复完成</div></div>
        <div style="text-align:center"><div style="font-size:26px;font-weight:700;color:var(--warning)">${hws.filter(t=>t.submissions?.find(s=>s.uid===uid)).length}/${hws.length}</div><div style="font-size:12px;color:var(--text-sub)">作业提交</div></div>
      </div><div style="margin-top:16px;font-size:13px;color:var(--text-sub)">请假次数：${leaves.filter(l=>l.uid===uid).length} 次</div>`;
    })() + '</div>'}
  </div>`;
}

function changePwd() {
  const old = document.getElementById('pwd-old').value;
  const nw = document.getElementById('pwd-new').value;
  const confirm = document.getElementById('pwd-confirm').value;
  if (!old || !nw || !confirm) { toast('请填写所有密码字段', 'error'); return; }
  if (old !== currentUser.pwd) { toast('当前密码错误', 'error'); return; }
  if (nw.length < 6) { toast('新密码至少6位', 'error'); return; }
  if (nw !== confirm) { toast('两次输入的新密码不一致', 'error'); return; }
  const users = DB.get('users') || [];
  const u = users.find(x => x.id === currentUser.id); if (!u) return;
  u.pwd = nw; currentUser.pwd = nw;
  DB.set('users', users); addLog('修改密码', '修改个人密码');
  toast('密码修改成功！', 'success');
  ['pwd-old', 'pwd-new', 'pwd-confirm'].forEach(id => document.getElementById(id).value = '');
}

function saveSettings() {
  const className = document.getElementById('setting-classname').value.trim();
  DB.set('settings', { className });
  document.getElementById('class-name-display').textContent = className;
  addLog('修改设置', '班级名称：' + className);
  toast('设置已保存', 'success');
}

function clearAllData() {
  confirm2('清空所有数据', '此操作将删除所有任务、通知、文件、记录等数据，且不可恢复！请谨慎操作！', () => {
    ['screenshots', 'replies', 'homeworks', 'lotteries', 'leaves', 'notices', 'files', 'logs'].forEach(k => DB.del(k));
    DB.del('inited'); initData();
    toast('数据已清空', 'success');
    navigate('home');
  }, true);
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.ctrlKey && e.key === 'f') {
    e.preventDefault();
    const s = document.getElementById('member-search');
    if (s) { s.focus(); s.select(); }
  }
});

// ============================================================
// INIT
// ============================================================
initData();
</script>
</body>
</html>
